services:
  - type: web
    name: pathshala-ai
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: ap-south-1
      - key: BEDROCK_MODEL_ID
        value: anthropic.claude-3-5-sonnet-20241022-v2:0
      - key: S3_BUCKET_NAME
        value: pathshala-curriculum-unique-name-1234
      - key: DYNAMODB_TABLE_NAME
        value: pathshala-lessons
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        value: "+14155238886"
      - key: TWILIO_WHATSAPP_TO
        sync: false
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.2
